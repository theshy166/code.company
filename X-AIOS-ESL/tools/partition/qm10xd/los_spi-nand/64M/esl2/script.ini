SCRIPT!
DONE=yes
REBOOT=no
CMD:
mtdparts del system;
mtdparts add  nand0 18m@21m system;
fatload usb 0:1 40008000 u-boot-spl-header.img;nand erase.part boot-spl;nand write 40008000 boot-spl splfilesize;
fatload usb 0:1 40008000 u-boot.bin;nand erase.part boot-uboot;nand write 40008000 boot-uboot ubootfilesize;
fatload usb 0:1 40008000 logo.img;nand erase.part logo;nand write 40008000 logo logofilesize;
fatload usb 0:1 40008000 misc.img;nand erase.part misc;nand write 40008000 misc 1000;
fatload usb 0:1 40008000 recovery.img;nand erase.part recovery;nand write 40008000 recovery recoveryfilesize;
fatload usb 0:1 40008000 recovery-rootfs_2KB_128KB_10MB.ubi;nand erase.part recovery-rootfs;nand write 40008000 recovery-rootfs recoveryfsfilesize;
fatload usb 0:1 40008000 zImage-dtb;nand erase.part boot;nand write 40008000 boot kernelfilesize;
fatload usb 0:1 40008000 system_2KB_128KB_18MB.ubi;nand erase.part system;nand write 40008000 system systemfilesize;
fatload usb 0:1 40008000 rootfs_2KB_128KB_6MB.ubi;nand erase.part rootfs;nand write 40008000 rootfs rootfsfilesize;
fatload usb 0:1 40008000 data_2KB_128KB_77MB.ubi;nand erase.part data;nand write 40008000 data datafilesize;
env default -a;setenv bootcmd 'nand read 0x40007fc0 boot kernelfilesize;bootz 0x40007fc0 - -;';saveenv;
setenv recoveryboot 'nand read 0x40008000 recovery recoveryfilesize;bootz 0x40008000 - -;';saveenv;
setenv bootargs 'loglevel=4 ubi.mtd=7 ubi.mtd=9 ubi.mtd=11 ubi.mtd=12 root=ubi2:rootfs init=/init rootfstype=ubifs mem=28M earlycon console=ttyS0,115200 mtdparts=spi_nfc:32k@0(boot-spl),128k@128k(boot-env),768k@256k(boot-uboot),1m@1m(logo),1m@2m(padding),1m@3m(misc),3m@4m(recovery),10m@7m(recovery-rootfs),4m@17m(boot),18m@21m(system),6m@39m(swapfile),6m@45m(rootfs),-@51m(data)';saveenv;
