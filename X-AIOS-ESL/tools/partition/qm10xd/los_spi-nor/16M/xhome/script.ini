SCRIPT!
DONE=yes
REBOOT=no
CMD:
sf probe;
fatload mmc 0:1 40008000 u-boot-spl-header.img;sf erase 0 8000;sf write 40008000 0 splfilesize;
fatload mmc 0:1 40008000 u-boot.bin;sf erase 8000 e0000;sf write 40008000 8000 ubootfilesize;
fatload mmc 0:1 40008000 misc.img;sf erase F8000 8000;sf write 40008000 F8000 1000;
fatload mmc 0:1 40008000 zImage-dtb;sf erase 100000 400000;sf write 40008000 100000 kernelfilesize;
fatload mmc 0:1 40008000 rootfs.squashfs;sf erase 500000 A00000;sf write 40008000 500000 rootfsfilesize;
fatload mmc 0:1 40008000 logo.img;sf erase f00000 80000;sf write 40008000 f00000 logofilesize;
fatload mmc 0:1 40008000 data.jffs2;sf erase f80000 80000;sf write 40008000 f80000 datafilesize;
env default -a;
setenv update 'fatload mmc 0:1 41000000 script.ini;source 41000000;run bootcmd';
setenv recoveryboot 'fatload mmc 0:1 0x40008000 recovery.img;bootz 0x40008000 - -;';
setenv bootargs 'loglevel=4 mem=33M earlycon console=ttyS0,115200 root=/dev/mtdblock5 rootfstype=squashfs user_debug=31 mtdparts=spi-nor:32k@0(boot-spl),928k@32k(boot-uboot),32k@960k(ukey),32k@992k(misc),4m@1m(kernel-dtb),10m@5m(rootfs),512k@15m(logo),-@15872k(data)';saveenv;
