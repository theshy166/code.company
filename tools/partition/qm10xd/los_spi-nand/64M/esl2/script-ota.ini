SCRIPT!
DONE=yes
REBOOT=yes
CMD:
mtdparts del system;
mtdparts add  nand0 18m@21m system;
ubifsload 0x40008000 /u-boot.bin.lzma;lzmadec 0x40008000 40947000;nand erase.part boot-uboot;nand write 40947000 boot-uboot ubootfilesize;
qua_logo logo_update_1.jpg;ubifsload 0x40008000 /zImage-dtb.lzma;lzmadec 0x40008000 40947000;nand erase.part boot;nand write 40947000 boot kernelfilesize;
qua_logo logo_update_2.jpg;ubifsload 0x40008000 /system_2KB_128KB_18MB.ubi.lzma;lzmadec 0x40008000 40A00000;nand erase.part system;nand write 40A00000 system systemfilesize;
qua_logo logo_update_3.jpg;ubifsload 0x40008000 /rootfs_2KB_128KB_6MB.ubi.lzma;lzmadec 0x40008000 40947000;nand erase.part rootfs;nand write 40947000 rootfs rootfsfilesize;
qua_logo logo_update_4.jpg;setenv bootcmd 'nand read 0x40007fc0 boot kernelfilesize;bootz 0x40007fc0 - -;';saveenv;
qua_logo logo_update_5.jpg;
ubifsload 0x40008000 /logo.img.lzma;lzmadec 0x40008000 40947000;nand erase.part logo;nand write 40947000 logo logofilesize;
ubifsumount;
setenv bootargs 'loglevel=4 ubi.mtd=7 ubi.mtd=9 ubi.mtd=11 ubi.mtd=12 root=ubi2:rootfs init=/init rootfstype=ubifs mem=28M earlycon console=ttyS0,115200 mtdparts=spi_nfc:32k@0(boot-spl),128k@128k(boot-env),768k@256k(boot-uboot),1m@1m(logo),1m@2m(padding),1m@3m(misc),3m@4m(recovery),10m@7m(recovery-rootfs),4m@17m(boot),18m@21m(system),6m@39m(swapfile),6m@45m(rootfs),-@51m(data)';saveenv;
